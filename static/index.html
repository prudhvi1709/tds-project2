<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDS Project API Interface</title>
    <!-- Bootstrap CSS from CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-4">
        <header class="pb-3 mb-4 border-bottom">
            <h1 class="display-5 fw-bold">TDS Project API Interface</h1>
        </header>

        <div class="p-4 mb-4 bg-light rounded-3">
            <div class="container-fluid">
                <h2>Ask a Question</h2>
                <p class="text-muted">Submit your question and optionally upload a file for analysis</p>
                
                <form id="questionForm" class="mb-3">
                    <div class="mb-3">
                        <label for="questionInput" class="form-label">Your Question:</label>
                        <textarea class="form-control" id="questionInput" rows="3" required></textarea>
                    </div>
                    
                    <div class="mb-3">
                        <label for="fileInput" class="form-label">Upload File (Optional):</label>
                        <input class="form-control" type="file" id="fileInput">
                    </div>
                    
                    <button type="submit" class="btn btn-primary">Submit</button>
                </form>
            </div>
        </div>

        <div class="p-4 mb-4 bg-light rounded-3" id="resultSection" style="display:none;">
            <div class="container-fluid">
                <h2>Result</h2>
                <div id="loadingIndicator" class="text-center" style="display:none;">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p>Processing your request...</p>
                </div>
                <div id="resultContent" class="p-3 bg-white rounded border"></div>
            </div>
        </div>

        <footer class="pt-3 mt-4 text-muted border-top">
            &copy; 2023 TDS Project
        </footer>
    </div>

    <!-- Bootstrap JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        document.getElementById('questionForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const question = document.getElementById('questionInput').value;
            const fileInput = document.getElementById('fileInput');
            
            // Show loading and result section
            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('loadingIndicator').style.display = 'block';
            document.getElementById('resultContent').innerHTML = '';
            
            // Create form data
            const formData = new FormData();
            formData.append('question', question);
            
            if (fileInput.files.length > 0) {
                formData.append('file', fileInput.files[0]);
            }
            
            try {
                // Replace with your actual API endpoint
                const apiUrl = 'https://your-fastapi-deployment-url.com/api';
                
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                // Hide loading indicator
                document.getElementById('loadingIndicator').style.display = 'none';
                
                // Display result
                if (data.answer) {
                    document.getElementById('resultContent').innerHTML = `
                        <h3>Answer:</h3>
                        <div class="p-2">${formatResponse(data.answer)}</div>
                    `;
                } else if (data.error) {
                    document.getElementById('resultContent').innerHTML = `
                        <h3 class="text-danger">Error:</h3>
                        <div class="p-2">${data.error}</div>
                    `;
                    
                    if (data.code) {
                        document.getElementById('resultContent').innerHTML += `
                            <h4 class="mt-3">Code that caused the error:</h4>
                            <pre class="p-2 bg-light border rounded">${data.code}</pre>
                        `;
                    }
                }
            } catch (error) {
                document.getElementById('loadingIndicator').style.display = 'none';
                document.getElementById('resultContent').innerHTML = `
                    <h3 class="text-danger">Error:</h3>
                    <div class="p-2">Failed to connect to the API: ${error.message}</div>
                `;
            }
        });
        
        // Function to format the response with proper line breaks
        function formatResponse(text) {
            return text.replace(/\n/g, '<br>');
        }
    </script>
</body>
</html>
